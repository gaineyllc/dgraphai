project_name: dgraph-agent
version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: dgraph-agent
    main: ./cmd/dgraph-agent
    binary: dgraph-agent
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:   [linux, windows, darwin]
    goarch: [amd64, arm64]

  - id: dgraph-gateway
    main: ./cmd/dgraph-gateway
    binary: dgraph-gateway
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:   [linux, darwin]
    goarch: [amd64, arm64]

  - id: dgraph-ingest
    main: ./cmd/dgraph-ingest
    binary: dgraph-ingest
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:   [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:   [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: dgraph-agent
    name_template: "dgraph-agent_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/install.md
      - config/config.example.yaml

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
      - --yes
    signature: "${artifact}.sig"

sboms:
  - artifacts: binary
    documents:
      - "{{ .Binary }}_{{ .Os }}_{{ .Arch }}.sbom.json"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

dockers:
  - image_templates:
      - "ghcr.io/gaineyllc/dgraph-agent:{{ .Tag }}-amd64"
      - "ghcr.io/gaineyllc/dgraph-agent:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/gaineyllc/dgraphai"

  - image_templates:
      - "ghcr.io/gaineyllc/dgraph-agent:{{ .Tag }}-arm64"
      - "ghcr.io/gaineyllc/dgraph-agent:latest-arm64"
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/gaineyllc/dgraph-agent:{{ .Tag }}"
    image_templates:
      - "ghcr.io/gaineyllc/dgraph-agent:{{ .Tag }}-amd64"
      - "ghcr.io/gaineyllc/dgraph-agent:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/gaineyllc/dgraph-agent:latest"
    image_templates:
      - "ghcr.io/gaineyllc/dgraph-agent:latest-amd64"
      - "ghcr.io/gaineyllc/dgraph-agent:latest-arm64"
