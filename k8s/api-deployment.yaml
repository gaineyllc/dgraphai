apiVersion: apps/v1
kind: Deployment
metadata:
  name: dgraphai-api
  namespace: dgraphai
  labels:
    app: dgraphai-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dgraphai-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dgraphai-api
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: dgraphai-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/gaineyllc/dgraphai-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7474
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dgraphai-secrets
                  key: database-url
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: dgraphai-secrets
                  key: neo4j-uri
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: dgraphai-secrets
                  key: neo4j-user
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dgraphai-secrets
                  key: neo4j-password
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: dgraphai-secrets
                  key: encryption-key
            - name: dgraphai_HOST
              value: "0.0.0.0"
            - name: dgraphai_PORT
              value: "7474"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 7474
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 7474
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: dgraphai-api
  namespace: dgraphai
spec:
  selector:
    app: dgraphai-api
  ports:
    - port: 80
      targetPort: 7474
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dgraphai-api
  namespace: dgraphai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dgraphai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dgraphai-api
  namespace: dgraphai
