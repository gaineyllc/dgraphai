# Keycloak — bundled OIDC identity provider for self-hosted / air-gapped deployments.
# dgraph.ai tenants can use this as their SSO provider instead of Okta/Azure AD.
# Configured to work with dgraph.ai's OIDC auth out of the box.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: dgraphai
  labels:
    app: keycloak
    component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        component: identity
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev"]  # change to "start" for production
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-url
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-user
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: db-password
            - name: KC_HOSTNAME
              value: "keycloak.dgraphai.internal"   # change to your domain
            - name: KC_PROXY
              value: edge
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: dgraphai
spec:
  selector:
    app: keycloak
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: dgraphai
type: Opaque
stringData:
  admin-user:     "admin"
  admin-password: "CHANGE_ME_STRONG_PASSWORD"
  db-url:         "jdbc:postgresql://postgres:5432/keycloak"
  db-user:        "keycloak"
  db-password:    "CHANGE_ME"
