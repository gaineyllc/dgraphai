# fsgraph secrets template
# DO NOT commit actual values — use sealed-secrets, Vault, or cloud KMS
# Apply with: kubectl apply -f secrets.yaml (never committed to git)
---
apiVersion: v1
kind: Secret
metadata:
  name: fsgraph-secrets
  namespace: fsgraph
type: Opaque
stringData:
  database-url:   "postgresql+asyncpg://fsgraph:CHANGE_ME@postgres:5432/fsgraph"
  neo4j-uri:      "bolt://neo4j:7687"
  neo4j-user:     "neo4j"
  neo4j-password: "CHANGE_ME"
  encryption-key: "CHANGE_ME_32_BYTES_BASE64_ENCODED"
---
apiVersion: v1
kind: Secret
metadata:
  name: fsgraph-scanner-secrets
  namespace: fsgraph
type: Opaque
stringData:
  backend-url: "https://your-fsgraph-instance.example.com"
  api-key:     "CHANGE_ME_SCANNER_API_KEY"
