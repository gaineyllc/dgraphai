apiVersion: apps/v1
kind: Deployment
metadata:
  name: dgraphai-scanner
  namespace: dgraphai   # or customer's namespace for on-prem
  labels:
    app: dgraphai-scanner
    component: scanner
spec:
  replicas: 1           # one scanner per deployment; scale by adding deployments
  selector:
    matchLabels:
      app: dgraphai-scanner
  template:
    metadata:
      labels:
        app: dgraphai-scanner
        component: scanner
    spec:
      terminationGracePeriodSeconds: 60   # allow running scans to finish
      serviceAccountName: dgraphai-scanner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: scanner
          image: ghcr.io/gaineyllc/dgraphai-scanner:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: health
              protocol: TCP
              # Health UI — only bind to pod IP, not exposed via Service
          env:
            - name: dgraphai_BACKEND_URL
              valueFrom:
                secretKeyRef:
                  name: dgraphai-scanner-secrets
                  key: backend-url
            - name: dgraphai_AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dgraphai-scanner-secrets
                  key: api-key
            - name: dgraphai_AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: dgraphai_HEALTH_HOST
              value: "127.0.0.1"   # loopback only — not accessible from outside pod
            - name: dgraphai_HEALTH_PORT
              value: "8080"
            - name: dgraphai_SCAN_INTERVAL_SECONDS
              value: "3600"
          volumeMounts:
            - name: scan-data
              mountPath: /data
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              host: "127.0.0.1"
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
              host: "127.0.0.1"
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # needs to write scan state
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: scan-data
          persistentVolumeClaim:
            claimName: dgraphai-scanner-data
---
# PVC for scan state (SQLite index DB, face embeddings cache)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dgraphai-scanner-data
  namespace: dgraphai
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dgraphai-scanner
  namespace: dgraphai
---
# NOTE: No Service for the scanner — health UI is loopback only.
# To view health UI: kubectl port-forward pod/dgraphai-scanner-xxx 8080:8080
# Then open http://localhost:8080
