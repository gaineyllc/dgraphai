# dgraph.ai Air-Gapped Bundle Manifest
# This file is signed with Ed25519 and included in the bundle.
# Verify: dgraph-agent verify-bundle --manifest bundle-manifest.yaml --signature bundle-manifest.sig

version: "0.2.0"
build_date: ""          # injected at build time
bundle_id: ""           # random UUID, injected at build time

# Container images included (pulled and saved as OCI tarballs)
images:
  - name: dgraphai/dgraphai
    tag:  "0.2.0"
    file: images/dgraphai-0.2.0.tar
  - name: dgraphai/dgraph-agent
    tag:  "0.1.0"
    file: images/dgraph-agent-0.1.0.tar
  - name: neo4j/neo4j-enterprise
    tag:  "5.18.0-enterprise"
    file: images/neo4j-5.18.0-enterprise.tar
  - name: bitnami/postgresql
    tag:  "16"
    file: images/postgresql-16.tar
  - name: redis
    tag:  "7"
    file: images/redis-7.tar
  - name: minio/minio
    tag:  "RELEASE.2024-01-01T00-00-00Z"
    file: images/minio.tar
  - name: meilisearch/meilisearch
    tag:  "v1.6"
    file: images/meilisearch-v1.6.tar
  - name: ollama/ollama
    tag:  "latest"
    file: images/ollama.tar
  - name: nginx/nginx-ingress
    tag:  "3.4.0"
    file: images/nginx-ingress-3.4.0.tar

# Ollama models (GGUF format, pre-quantized)
models:
  - name: llama3.2
    file: models/llama3.2-q4_K_M.gguf
    sha256: ""   # injected at build time
    size_gb: 2.4
  - name: qwen2.5-coder-7b
    file: models/qwen2.5-coder-7b-q4_K_M.gguf
    sha256: ""
    size_gb: 4.1
  - name: llava-v1.6
    file: models/llava-v1.6-mistral-7b-q4_K_M.gguf
    sha256: ""
    size_gb: 4.5
  - name: deepseek-r1-7b
    file: models/deepseek-r1-distill-qwen-7b-q4_K_M.gguf
    sha256: ""
    size_gb: 4.3

# Binaries
binaries:
  - name: dgraph-agent-linux-amd64
    file: bin/dgraph-agent-linux-amd64
    sha256: ""
  - name: dgraph-agent-linux-arm64
    file: bin/dgraph-agent-linux-arm64
    sha256: ""
  - name: dgraph-agent-windows-amd64.exe
    file: bin/dgraph-agent-windows-amd64.exe
    sha256: ""

# Helm charts (OCI tarballs)
charts:
  - name:    dgraphai
    version: "0.1.0"
    file:    charts/dgraphai-0.1.0.tgz
  - name:    dgraph-agent
    version: "0.1.0"
    file:    charts/dgraph-agent-0.1.0.tgz

# Install scripts
scripts:
  install:   scripts/install.sh
  uninstall: scripts/uninstall.sh
  verify:    scripts/verify-bundle.sh

# Total bundle size (approximate)
total_size_gb: 25

# Requirements
requirements:
  kubernetes: ">=1.27"
  helm:       ">=3.12"
  storage_gb: 500
  memory_gb:  32
  cpu_cores:  8
  gpu:        optional   # required for vision enrichment
