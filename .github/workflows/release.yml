name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write   # for cosign keyless signing

jobs:

  # ── Test suite ───────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dgraphai_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with: { version: "latest" }

      - name: Install Python deps
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit -q --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/dgraphai_test

      - name: Run E2E tests
        run: uv run pytest tests/e2e -q --tb=short -m "not slow"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/dgraphai_test

  # ── Go agent build ───────────────────────────────────────────────────────────
  build-agent:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: agent-go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image (API + frontend) ────────────────────────────────────────────
  build-image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gaineyllc/dgraphai
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes ghcr.io/gaineyllc/dgraphai:${{ steps.meta.outputs.version }}

  # ── Helm chart publish ────────────────────────────────────────────────────────
  publish-charts:
    runs-on: ubuntu-latest
    needs: [build-image, build-agent]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Package and push charts
        run: |
          helm package charts/dgraphai   --destination /tmp/charts
          helm package charts/dgraph-agent --destination /tmp/charts
          helm push /tmp/charts/dgraphai-*.tgz   oci://ghcr.io/gaineyllc/charts
          helm push /tmp/charts/dgraph-agent-*.tgz oci://ghcr.io/gaineyllc/charts
        env:
          HELM_REGISTRY_CONFIG: |
            {"auths":{"ghcr.io":{"auth":"${{ secrets.GITHUB_TOKEN }}"}}}

  # ── GitHub release notes ──────────────────────────────────────────────────────
  release-notes:
    runs-on: ubuntu-latest
    needs: [publish-charts]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### SaaS (agent only)
            ```bash
            helm install dgraph-agent oci://ghcr.io/gaineyllc/charts/dgraph-agent \
              --set config.tenantId=YOUR_TENANT_ID \
              --set credentials.apiKey=YOUR_API_KEY \
              --set config.agentName=my-office
            ```

            ### Self-hosted (full platform)
            ```bash
            helm install dgraphai oci://ghcr.io/gaineyllc/charts/dgraphai \
              --set api.env.JWT_SECRET=$(openssl rand -hex 32) \
              --set postgresql.auth.password=CHANGE_ME \
              --set neo4j.neo4j.password=CHANGE_ME
            ```

            ### Binary install (agent)
            Download the appropriate binary from the assets below.
            Verify signature: `cosign verify-blob dgraph-agent-linux-amd64 --bundle dgraph-agent-linux-amd64.bundle`
