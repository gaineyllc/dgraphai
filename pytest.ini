[pytest]
asyncio_mode = auto
# Required env vars for test runs
env =
    JWT_SECRET=test-secret-for-unit-tests-only-not-production
    DGRAPHAI_ENABLE_DOCS=true
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = WARNING
markers =
    unit: Pure unit tests — no I/O, no DB, no graph
    integration: Integration tests — needs Postgres + Neo4j running
    e2e: End-to-end API tests — spins up the full FastAPI app
    p0: Critical path tests (auth, billing, settings, API keys)
    p1: High priority tests (search, audit log, graph UX, webhooks)
    p2: Nice-to-have tests (SCIM, metrics, SDK)
    slow: Tests that take >5s
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
