version: "3.9"

# dgraph.ai - local development stack
#
# Start everything:   docker compose up -d
# Core only (faster): docker compose up -d postgres neo4j redis
#
# URLs:
#   API:          http://localhost:8000
#   Frontend:     http://localhost:5173  (cd web && npm run dev)
#   Neo4j:        http://localhost:7474  (neo4j / fsgraph-local)
#   Keycloak:     http://localhost:8080  (admin / admin)
#   Meilisearch:  http://localhost:7700
#   Redis:        localhost:6379
#   Postgres:     localhost:5432

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     dgraphai
      POSTGRES_PASSWORD: dgraphai-local
      POSTGRES_DB:       dgraphai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dgraphai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: "neo4j/fsgraph-local"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Redis (Celery broker + rate limiting + cache) ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Keycloak (local OIDC/SSO — dev + integration tests) ────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB:                   dev-file
      KC_HTTP_PORT:            "8080"
      KC_HOSTNAME_STRICT:      "false"
      KC_HTTP_ENABLED:         "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Meilisearch (full-text search) ─────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  # ── API server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:          postgresql+asyncpg://dgraphai:dgraphai-local@postgres:5432/dgraphai
      NEO4J_URI:             bolt://neo4j:7687
      NEO4J_USER:            neo4j
      NEO4J_PASSWORD:        fsgraph-local
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_URL:     redis://redis:6379/1
      REDIS_URL:             redis://redis:6379/0
      MEILISEARCH_URL:       http://meilisearch:7700
      KEYCLOAK_URL:          http://keycloak:8080
      OIDC_ISSUER_URL:       http://keycloak:8080/realms/dgraphai
      JWT_SECRET:            dev-jwt-secret-change-in-production
      ENCRYPTION_KEY:        ""
      APP_URL:               http://localhost:8000
      DGRAPHAI_ENABLE_DOCS:  "true"
      LOG_LEVEL:             info
    depends_on:
      postgres:   { condition: service_healthy }
      neo4j:      { condition: service_healthy }
      redis:      { condition: service_healthy }
    command: >
      sh -c "
        uv run alembic upgrade head &&
        uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      - .:/app
      - /app/.venv
    working_dir: /app

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build: { context: ., dockerfile: Dockerfile }
    environment:
      DATABASE_URL:      postgresql+asyncpg://dgraphai:dgraphai-local@postgres:5432/dgraphai
      NEO4J_URI:         bolt://neo4j:7687
      NEO4J_USER:        neo4j
      NEO4J_PASSWORD:    fsgraph-local
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_URL: redis://redis:6379/1
      REDIS_URL:         redis://redis:6379/0
    command: >
      uv run celery -A src.dgraphai.tasks.celery_app worker
      --queues=default,alerts,gdpr,enrichment --concurrency=2 --loglevel=info
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - .:/app
      - /app/.venv
    working_dir: /app

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  beat:
    build: { context: ., dockerfile: Dockerfile }
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      DATABASE_URL:      postgresql+asyncpg://dgraphai:dgraphai-local@postgres:5432/dgraphai
    command: >
      uv run celery -A src.dgraphai.tasks.celery_app beat --loglevel=info
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes:
      - .:/app
      - /app/.venv
    working_dir: /app

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  meilisearch_data:
  keycloak_data:
